<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델</title>
    <style>
        .box1 {
            box-sizing: border-box;
            background-color: deepskyblue;
            padding: 20px;
            margin-bottom: 50px;
            border: 1px solid #ccc;
            width: 300px;
        }
        .box2 {
            background-color: deeppink;
            padding: 20px;
            margin-top: 30px;
            border: 3px dotted #ccc;
            width: 300px;

        }
    </style>
</head>
<body>
    <!-- 
        박스 모델: HTML 요소 하나하나를 사각형 상자로 보고 내용(content), 안쪽 여백(padding), 테두리(border), 바깥 여백(margin)으로 구성된 구조로 이해하는 개념

        > 브라우저는 위 네 영역을 합쳐서 요소의 실제 크기와 화면에서 차지하는 공간을 계산
    -->
    <!-- 
        padding: 박스 모델에서 내용과 테두리 사이의 안쪽 여백을 의미하며, 요소 내부의 컨텐츠가 테두리에 너무 붙지 않도록 공간을 만들어 가독성과 디자인 완성도를 높임

        예) <h1>안녕하세요</h1>
        h1 { padding: 20px; } /* 네 방향 모두 */
        h1 { padding: 10px 20px; } /* 상하 10px, 좌우 20px */
        h1 { padding: 10px 20px 30px; } /* 상 10px, 좌우 20px, 하 30px */
        h1 { padding: 10px 20px 30px 40px; } /* 상 10px, 우20px, 하 30px, 좌 40px (시계방향) */
    -->
    <!-- 
        border: 박스 모델에서 요소의 테두리 영역을 의미하며, padding과 margin 사이에 위치해 요소의 경계를 시각적으로 구분해 주는 역할을 함

        속성 
        - border-width: 테두리 두께
        - border-style: 테두리 형태 (solid, dashed, dotted 등)
        - border-color: 테두리 색상
        - border: 위 세 속성을 한 번에 지정하는 축약 속성
        - border-radius: 모서리를 둥글게 처리
    -->
    <!-- 
        margin: 박스 모델에서 요소의 바깥쪽 여백을 의미하며, 요소와 요소 사이의 간격을 조절하는 사용. 위아래 마진은 상황에 따라 마진 병합이 발생할 수 있어 레이아웃 이해에 중요함(블록태그에서 상하 마진 중 큰쪽을 선택, 같으면 하나만 적용
        -> 인라인 태그는 원래 상하좌우에 크기를 줄 수 없기 때문에 블록 태그에서만 유효) 

        예) <h1>안녕하세요</h1>
        h1 { margin: 20px; } /* 네 방향 모두 */
        h1 { margin: 10px 20px; } /* 상하 10px, 좌우 20px */
        h1 { margin: 10px 20px 30px; } /* 상 10px, 좌우 20px, 하 30px */
        h1 { margin: 10px 20px 30px 40px; } /* 상 10px, 우20px, 하 30px, 좌 40px (시계방향) */

        h1 { margin: 0 auto; } /* 상하 0px, 좌우 동일하게 (가로 가운데 정렬) */
    -->
    <!-- 
        * 개발 시 % 단위로 개발하는 것이 좋은데 (반응형)
        -> 이때 padding, border, margin을 주면 깨지게 될것임..@@!!
        -> 그래서 box-sizing!

        box-sizing
        CSS에서 요소의 너비와 높이를 어떤 기준으로 계산할지 결정하는 속성으로, 박스 모델의 크기 계산 방식을 제어
        content-box: width와 height에 내용(content)만 포함하고 padding과 border를 바깥으로 더함
        border-box: padding과 border를 너비/높이에 포함시켜 요소의 실제 크기를 예측하기 쉽게 만듦⭐

    -->
        <div class="box1">
            box1

        </div>
        <div class="box2">
            box2
        </div>
</body>
</html>
<!-- 
    * 변수명 표기법
        카멜 : 첫 단어는 소문자, 이어지는 단어들 첫 글자만 대문자. Java, JavaScript에서 사용 (예: userName)
        파스칼 : 단어의 첫 글자 대문자. C#, 클래스명에서 사용 (예: Username)
        스네이크 : 모든 단어 소문자, 단어 사이에 언더바(_)로 구분. 파이썬, 데이터베이스 컬럼명에서 사용 (예: user_name)
        헝가리안 : 변수의 이름 앞에 데이터 타입을 의미하는 축약어를 접두사로 사용. 과거 C/C++ 에서 사용 (예: strUserName, nTotalScore)

    * text-align처럼 태그 가운데 정렬은 margin 이용

    * width가 박스 모델의 크기가 아님. 1px 차이로 보기 싫은 정렬이 생길 수 있음 
-->
