<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position - fixed</title>
    <style>
        .fixed-box {
            background-color: orange;
            padding: 15px;
            right: 20px;
            bottom: 20px;

    </style>
</head>
<body>

        fixed
        요소를 브라우저 화면(뷰포트)을 기준으로 고정시키는 위치 지정 방식으로, 스크롤을 내려도 해당 요소가 항상 같은 위치에 머무는 특징을 가지는 방식
    -->

    <p>스크롤을 내려보세요.</p>

    <!-- a태그의 href속성 값으로 #입력하면 맨위로 이동 -->
