<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2단 레이아웃</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 900px;
            margin: 20px auto;
            border: 2px solid #000;
        }
        header, footer {
            padding: 20px;
            border: 2px solid #000;
            margin: 10px;
        }
        main {
            margin: 10px;
            border: 2px solid #000;
            padding: 10px;
        }
        .left {
            float: left;
            width: 65%;
            height: 300px;
            border: 2px solid #000;
            padding: 20px;
            margin-right: 10px;

        }
        .right {
            float: left;
            width: 33.5%;
            border: 2px solid #000;
            padding: 20px;
        }
        .clear {
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            헤더영역
        </header>
        <main>
            <section class="left">
                왼쪽 컨텐츠 영역<br>
                padding / border / margin / box-sizing 적용
            </section>
            <aside class="right">
                오른쪽 컨텐츠 영역<br>
                float로 수평 정렬
            </aside>
            <div class="clear"></div>
        </main>
        <footer>
            푸터 영역
        </footer>
    </div>
</body>
</html>
