<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
    <style>
        img {
            float: left;
            margin-right: 20px;
        }
    </style>
</head>
<body>
    <!-- 
        float
        float는 CSS에서 요소를 문서의 일반적인 흐름에서 살짝 분리해 왼쪽이나 오른쪽으로 띄우는 속성으로, 주로 이미지 옆에 텍스트를 배치하거나 과거에는 다단 레이아웃을 구성하는데 사용되었음
    -->
    <img src="./spring1.png" alt="봄">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius molestiae maiores aliquid officiis dolores libero quo consequatur? Ipsam, veniam quisquam sed neque beatae voluptas provident, molestiae, repellat odit dolorum ipsum.
    <hr>
    <!-- 
        clear
        clear 속성은 float가 적용된 요소로 인해 흐트러진 레이아웃을 정리하기 위해 사용하는 CSS 속성으로, 앞에 떠있는 (float된) 요소의 영향을 받아 나란히 배치되지 않도록 하고 그 아래로 내려가게 만드는 역할을 함
    -->
</body>
</html>

<!-- 
    * html 초기에는 표로 가로 정렬을 했지만, 표를 사용하지 않으면서 부터 가로 정렬에 문제가 생겼음. float는 편법이라 나중에 배울 내용으로 가로 정렬을 할 것
