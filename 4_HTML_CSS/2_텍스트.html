<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트</title>
</head>

<body>
    <!-- 
        블록 태그 : 한 줄 전체를 차지하며 줄바꿈이 자동으로 발생
        인라인 태그 : 내용만큼만 공간을 차지하며 줄바꿈이 발생하지 않음

        코드 자동 정렬 : 
            윈 : shift + alt + f
            맥 : shift + option + f
    -->
    <!-- 제목 태그 -->
    <h1>안녕하세요. Heading</h1>여기에 문자를 입력하면 아래로 내려감
    <h2>안녕하세요. Heading</h2>
    <h3>안녕하세요. Heading</h3>
    <h4>안녕하세요. Heading</h4>
    <h5>안녕하세요. Heading</h5>
    <h6>안녕하세요. Heading</h6>
    일반텍스트
    일반텍스트
    일반텍스트
    일반&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;텍스트
    일반텍스트<br>일반텍스트
    <hr>

    <!-- 문단 태그 -->
    <p>문단을 만드는 태그</p>일반텍스트

    <!-- 서식 태그 -->
    <p><b>굵게</b>표현하기</p>
    <p><strong>굵게</strong>표현하기</p>
    <p><i>이탤릭체</i> 표현하기</p>
    <p><em>이탤릭체</em> 표현하기</p>
    <p><ins>밑줄</ins> 표현하기</p>
    <p><del>삭제</del> 표현하기</p>
    <p>x<sup>2</sup> + y<sup>3</sup> = z</p>
    <p>H<sub>2</sub>O</p>
</body>

</html>
