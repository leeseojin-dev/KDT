<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스트</title>
</head>

<body>
    <!-- 순서가 없는 태그 emmet : ul>li*3 -->
    <ul>
        <li>김사과</li>
        <li>오렌지</li>
        <li>바나나</li>
    </ul>
    <!-- 순서가 있는 태그 -->
    <ol>
        <li>김사과</li>
        <li>오렌지</li>
        <li>반하나</li>
    </ol>
    <!-- 설명 목록 태그 dl>dt+dd*3  dl>dt{류정원}+dd*3-->
     <dl>
        <dt>류정원 선생님</dt>
        <dd>김사과</dd>
        <dd>오렌지</dd>
        <dd>반하나</dd>
     </dl>

</body>

</html>
