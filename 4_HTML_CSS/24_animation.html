<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        @font-face {
            font-family: 'Soonbatang';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_eight@1.0/SunBatang-Light.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Soonbatang';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_eight@1.0/SunBatang-Medium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Soonbatang';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_eight@1.0/SunBatang-Bold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        body { font-family: "Soonbatang"; }

        @keyframes toastIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .toast {
            width: 360px;
            border: 2px solid #000;
            padding: 16px;
            margin-bottom: 30px;

            animation-name: toastIn;
            animation-duration:  0.6s;
            animation-timing-function: ease-out;
            animation-delay: 0.2s;
            animation-fill-mode: forward;
            opacity: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            width: 46px;
            height: 46px;
            border: 6px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            margin-bottom: 30px;

            animation: spin 1s linear 0s infinite normal none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .badge {
            display: inline-block;
            border: 2px solid #000;
            padding: 8px 12px;
            margin-bottom: 30px;

            animation: pulse 0.7s ease-in-out 0s infinite alternate none;
        }

        .pause-hint {
            margin-top: 10px;
            font-size: 14px;
        }

        .badge:hover {
            animation-play-state: paused;
        }

        h2 { margin: 20px 0 10px; }
    </style>
</head>
<body>
    <!-- 
        animation
        @keyframes 이용해 여러 단계의 스타일 변화를 정의하고 이를 자동으로 재생하는 기능으로, 사용자 상호작용이 없어도 시간의 흐름에 따라 요소가 움직이거나 변형되도록 만들 수 있음

        @keyframes 애니메이션이름 {
            단계 {
                스타일;
            }
        }

        예)
        @keyframes move {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            25% { transform: translateY(-50); }
            50% { transform: translateY(-10); }
            75% { transform: translateY(20); }
            100% { transform: translateY(0); }            
        }

        animation-name
        animation-name: fade
        적용할 @keyframes 이름을 지정

        animation-duration
        animation-duration: 2s;
        애니메이션 한 번 실행되는 시간

        animation-timing-function
        animation-timing-function: ease-in-out
        애니메이션 속도 변화 방식

        animation-delay
        animation-delay: 1s;
        애니메이션 시작 전 대기 시간

        animation-iteration-count
        animation-iteration-count: infinite;
        반복 횟수 지정. 숫자 또는 infinite(무제한)

        animation-direction
        animation-direction: alternate;
        재생 방향. forward, backward, alternate
        
        animation-fill-mode
        animation-fill-mode: forwards;
        시작/종료 후 스타일 유지 여부

        animation-play-state
        animation-play-state: paused;
        애니메이션 재생/정지. play(진행), paused(멈춤)

        animation: name duration timing-function delay iteration-count direction fill-mode;
        축약 문법
    -->

    <h2>토스트(알림) 등장</h2>
    <div class="toast">
        저장되었습니다! (0.2초 후 부드럽게 등장)
    </div>

    <h2>로딩 스피너</h2>
    <div class="spinner"></div>

    <h3>강조 배지(펄스)</h3>
    <div class="badge">HOT</div>
    <div class="pause-hint">배지에 바우스를 올리면 애니메이션이 멈춥니다.</div>
</body>
</html>
