<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
    <style>
        .box { height: 100px;}
        #box1 { width: 100px; background-color: deeppink; float: left; margin-right: 10px; }
        #box2 { width: 100px; background-color: deepskyblue; float: left; margin-right: 10px; }
        #box3 { width: 100px; background-color: gold; float: left;}
        #box4 { width: 100px; background-color: greenyellow; float: right; }
        #clear { clear: both;}
    </style>
</head>
<body>
    <div id="box1" class="box">1번</div>
    <div id="box2" class="box">2번</div>
    <div id="box3" class="box">3번</div>
    <div id="box4" class="box">4번</div>

</body>
</html>
