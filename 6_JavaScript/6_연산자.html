<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산자</title>
    <script>
        /*
            연산자

            1. 산술 연산자
                + - * / % **

            2. 대입 연산자
                += -= *= /= %= **=

            3. 비교 연산자
                == != > < >= <= === !==

                == : 값만 비교
                === : 값 + 타입까지 비교
                    10 == "10" -> true (자동 형변환으로 인해 true)
                    10 === "10" -> false (데이터형은 다르니까 false. 자바스크립트에서 많이 사용하는 연산자⭐)
                
                != : 값만 비교
                !== : 값 + 타입까지 비교 (잘 사용하지 않음)
                    10 != "10" -> false
                    10 !== "10" -> true (값 또는 타입이 다르면 true) !(a === b)

            4. 논리 연산자
                && || !

            5. 증감 연산자
                ++ --

            6. 문자열 연산자
                +
            
            7. 조건(삼항) 연산자
                조건 ? true일때 : false일때
            
            8. 타입 관련 연산자
                typeof : 변수의 타입을 반환
                instanceof : 변수가 특정 객체의 타입인지 확인

            9. 기타 연산자
                , : 여러 표현식 나열
                ?. : 옵셔널 체이닝(null인지 아닌지 체크)
                ?? : null 병합 연산자(null일 경우 특정값을 반환)        
        */
    </script>
</head>
<body>
    <script>
        // 비교 연산자
        console.log(5 == "5")
        console.log(5 === "5")

        // 증감 연산자
        let count = 1
        count++
        console.log(count)      // 2
        count--
        console.log(count)      // 1
        let result = ++ count
        console.log(result)     // 2
        console.log(count)      // 2
        result = count++        
        console.log(result)     // 2
        console.log(count)      // 3

        // 조건(삼항) 연산자
        let score = 85
        result = score >= 60 ? "합격" : "불합격"
        console.log(result)

        // 타입 관련 연산자
        let num = 10
        let arr = []
        console.log(typeof num)     // number
        console.log(arr instanceof Array)   // true (arr은 Array 객체인지 확인하는 연산)

        // 기타 연산자
        let x = (1, 2, 3, 10)
        console.log(x)      // 여러 값이 나열되어있을 때 마지막으로 저장된 값을 출력

        let user = null
        console.log(user?.name)     // undefined. 에러 날 것 같을 때 사용해주면 에러 대신 undefined 출력
        
        let value = null
        let resultValue = value + "기본값"     
        console.log(resultValue)            // null기본값
        let resultValue2 = value ?? "기본값" 
        console.log(resultValue2)           // 기본값 (null은 없다치고 "기본값"만 출력)
    </script>
</body>
</html>
