<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정규식</title>
    <script>
        /*
            정규식
            문자열에서 특정한 패턴을 찾거나, 검사하거나, 치환하기 위해 사용하는 표현식

            정규식 작성법 : 
            /패턴/옵션
            또는
            new RegExp("패턴", "옵션")

            패턴
            a: 문자 a           // 문자열 a를 찾아라 
            abc: 문자열 abc     // 문자열 abc를 찾아라
            .: 아무 문자 1개
            [abc]: a 또는 b 또는 c
            [a-z]: a부터 z
            [가-힣]: 한글 전체
            [0-9]: 숫자 전체
            [^0-9]: 숫자가 아닌 문자
            *: 0번 이상
            +: 1번 이상
            ?: 0 또는 1
            {n}: 정확히 n번     // {3}: 3글자
            {n,}: n번 이상
            {n,m}: n~m번
            ^: 문자열 시작
            $: 문자열 끝
            \d: 숫자
            \D: 숫자가 아닌 것
            \w: 문자 또는 숫자 또는 _
            \W: 문자 또는 숫자 또는 _ 외
            \s: 공백
            \S: 공백 아닌 문자
            g: 전체 검색
            i: 대소문자 무시
            m: 여러 줄 처리
            
            test(): 패턴 존재 여부
                const reg = /^[0-9]+$/  // 숫자로 시작해야 하고 1개 이상 문자가 있고 끝남
                reg.test("a123")        // false (숫자로 시작하지 않음)
                reg.test("1234")        // true

            match(): 일치 결과 반환
                "abc123".match(/\d+/)   // ["123"] (숫자인데 여러 글자인 부분을 배열로 반환)
            
            replace(): 치환
                "010-1234-5678".replace(/-/g, "")         // 01012345678 (-을 전체 검색 후 없애줘)
            
            search(): 위치 반환
                "hello".search(/e/)         // 1 (e가 있는 인덱스 위치 반환)                         

        */
    </script>
</head>
<body>
    <button id="checkBtn">검사하기</button>
    <script>
        document.getElementById("checkBtn").addEventListener("click", function() {
            const email = "apple@apple.com"
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/         // 공백도 @도 아닌 문자로 시작하고 여러 문자가 들어가야하고, @가 들어가야하고, 공백도 @도 아닌 문자, . 자체, 공백도 @도 아닌 문자로 끝남
            console.log("이메일 검사: ", emailRegex.test(email))

            const phone = "010-1234-5678"
            const phoneRegex = /^010-\d{3,4}-\d{4}$/        // 3글자 또는 4글자
            console.log("휴대폰 번호 검사: ", phoneRegex.test(phone))
        })

    </script>
    
</body>
</html>
