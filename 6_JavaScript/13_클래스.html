<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클래스</title>
    <script>
        /*
            클래스 사용 방법
            class 클래스명 {
                constructor(매개변수1, 매개변수2, ...){
                    속성 정의
                }
                메서드명(매개변수1, 매개변수2, ...){
                    객체가 할 수 있는 동작 정의
                }
            }

            클래스 상속
            - 다른 클래스의 속성과 메서드를 물려받을 수 있음
                class 클래스명 extends 부모클래스명 {

                }

            정적 메서드
            - 클래스 이름으로 직접 호출하는 메서드

            클래스 필드
            - constructor 없이 속성을 바로 정의 가능
            - 클래스 레벨 속성, 비공개 속성 정의에 유리함
            - (파이썬의 클래스 필드는 공유하지만 자바스크립트의 클래스는 그렇지 않음)

            get/set (은닉)
            - get과 set은 같은 이름을 공유해야 함
            - 내부에서 값을 저장할 땐 보통 _name처럼 언더스코어(_)를 붙여서 구분
            - get만 정의하면 읽기 전용 속성이 됨

            private 필드
            - 클래스 내부에서만 접근 가능한 비공개 속성
            - #을 붙이면 반드시 동일한 클래스 안에서만 접근 가능
            - class 단에서만 생성 가능 (= constructor 안에서 생성 불가)
            - (1. 클래스 필드가 있어야 하고, 2. 값을 초기화하기 위해 constructor 사용)

        */
    </script>
</head>
<body>
    <h1>클래스</h1>
    <script>
        class Animal {
            constructor(type) {
                this.type = type
            }
            bark() {
                console.log(`${this.type} 멍멍!`)
            }
            speak() {
                console.log("동물이 소리를 냅니다")
            }
        }

        const dog = new Animal("강아지")
        console.log(`dog의 type: ${dog.type}`)
        dog.bark()

        class Dog extends Animal {
            constructor(type, color) {
                super(type)     // 부모의 생성자 호출
                this.color = color
            }

            speak() {                   // Animal의 speak에 오버라이딩
                console.log("멍멍!")
            }

             showInfo() {
                console.log(`${this.type}는 ${this.color}입니다`)
             }
        }

        const rucy = new Dog("가나디", "흰색")      // 자식에 생성자가 없으면 부모 생성자 사용
        rucy.speak()
        rucy.bark()
        rucy.showInfo()
    </script>
    <hr>

    <h1>정적 메서드</h1>
    <script>
        console.log("========================")

        class MathTool {
            static add(a, b) {
                return a + b
            }
        }

        console.log(MathTool.add(3, 4))
    </script>
    <hr>
    <h1>클래스 필드</h1>
    <script>
        class Product {
            name = "상품명 없음"
            price = 0

            showInfo() {
                console.log(`${this.name}의 가격은 ${this.price}원입니다`)
            }
        }
        product = new Product()
        product.showInfo()

    </script>
    <hr>
    <h1>get / set</h1>
    <script>
        console.log("========================")

        class User {
            #password = ""          // 외부에서 접근 불가

            constructor(name, password) {
                this._name = name               // 관례적으로 get/set에서 사용할 속성명
                this.#password = password
            }

            // get
            get name() {
                return this._name
            }

            //set
            set name(newName) {
                if (newName.length < 2) {
                    console.log("이름은 두 글자 이상이어야 합니다.")
                } else {
                    this._name = newName
                }
            }

            checkPassword(input) {
                return this.#password === input
            }
        }

        const user = new User("김사과", "1111")
        console.log(user)
        user.name = "반"            // set 작동
        user.name = "반하나"        // set 작동
        console.log(user.name)      // get 작동
        console.log(user.checkPassword("1111"))
        console.log(user.checkPassword("1234"))
        // console.log(user.#password)      // 외부에서 접근 불가. 실행 시 에러 발생
    </script>
    <hr>
    <h1>Account 클래스</h1>
    <script>
        console.log("========================")

        class Account {
            static accountCount = 0         // 클래스로 접근하니까 모든 계좌에서 공용 사용가능한 속성
            #balance = 0                 // 외부 접근 불가

            constructor(owner) {
                this.owner = owner
                Account.accountCount++           // 계좌 하나(=객체)가 생성될 때마다 1씩 증가
            }

            get balance() {             // 변수명과 일치
                return this.#balance
            }

            set balance(value) {
                console.log("직접 잔액을 설정할 수 없습니다.")
            }

            deposit(amount) {       // 입금
                if(amount > 0) {
                    this.#balance += amount
                    console.log(`${this.owner}님, ${amount}원 입금되었습니다.`)
                }
            }

            withdraw(amount) {      // 출금
                if(amount <= this.#balance) {
                    this.#balance -= amount
                    console.log(`${this.owner}님, ${amount}원 출금되었습니다.`)
                } else {
                    console.log("잔액이 부족합니다.")
                }
            }

            static getAcountCount() {
                return `총 계좌 수 : ${Account.accountCount}`
            }
        }

        const user1 = new Account("김사과")
        user1.deposit(1000)
        console.log(user1.balance)          // get 실행

        user1.balance = 5000                // set 실행
        console.log(user1.balance)

        user1.withdraw(10000)
        user1.withdraw(300)

        const user2 = new Account("반하나")
        user2.deposit(6000)

        console.log(Account.getAcountCount())
    </script>
</body>
</html>
