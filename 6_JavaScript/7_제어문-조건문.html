             switch 문
             여러 개의 경우case를 비교할 때 사용하는 조건문
             break가 없으면 값이 일치하는 case부터 이후의 코드들이 출력된다

             switch(값) {
                case 값1:

                case 값2:
                    값이 값2와 일치할 때 실행할 코드
                    break

                default:
                    위에 모든 case에 값이 일치하지 않을 때 실행할 코드
             }

    <hr>
    <h1>switch문 예제</h1>
    <script>
        let mbti = "ENFP"

        switch(mbti) {
            case "INFJ":
                console.log("조용하지만 깊은 통찰력")
                break
            case "ENFP":
                console.log('열정 가득')
                break
            case "ISTJ":
                console.log("현실주의자")
                break
            case "ENTJ":
                console.log("리더쉽이 뛰어남")
                break
            default:
                console.log("등록되지 않은 MBTI")     
        }
    </script>
