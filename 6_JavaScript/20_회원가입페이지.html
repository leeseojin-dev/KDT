<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 가입</title>
    <script src="./js/regist.js"></script>
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function sample6_execDaumPostcode() {
            new kakao.Postcode({
                oncomplete: function(data) {
                    // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                    // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                    // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                    var addr = ''; // 주소 변수
                    var extraAddr = ''; // 참고항목 변수

                    //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                    if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
                        addr = data.roadAddress;
                    } else { // 사용자가 지번 주소를 선택했을 경우(J)
                        addr = data.jibunAddress;
                    }

                    // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
                    if(data.userSelectedType === 'R'){
                        // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                        // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                        if(data.bname !== '' && /[동로가]$/.test(data.bname)){
                            extraAddr += data.bname;
                        }
                        // 건물명이 있고, 공동주택일 경우 추가한다.
                        if(data.buildingName !== '' && data.apartment === 'Y'){
                            extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                        }
                        // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                        if(extraAddr !== ''){
                            extraAddr = ' (' + extraAddr + ')';
                        }
                        // 조합된 참고항목을 해당 필드에 넣는다.
                        document.getElementById("sample6_extraAddress").value = extraAddr;
                    
                    } else {
                        document.getElementById("sample6_extraAddress").value = '';
                    }

                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById('sample6_postcode').value = data.zonecode;
                    document.getElementById("sample6_address").value = addr;
                    // 커서를 상세주소 필드로 이동한다.
                    document.getElementById("sample6_detailAddress").focus();
                }
            }).open();
        }
    </script>
</head>
<body>
    <h2>회원 가입</h2>
    <form action="/regist" method="post" onsubmit="return sendit()">
        <input type="hidden" name="ssncheck" id="ssncheck" value="n">

        <p>아이디: <input type="text" name="userid" id="userid" maxlength="20" placeholder="아이디를 입력하세요"></p>
        <p>비밀번호: <input type="password" name="userpw" id="userpw", maxlength="20" placeholder="비밀번호를 입력하세요"></p>
        <p>비밀번호 확인: <input type="password" name="userpw_re" id="userpw_re" maxlength="20" placeholder="비밀번호를 다시 한번 입력하세요"></p>
        <p>이름: <input type="text" name="name" id="name" maxlength="10" placeholder="이름을 입력하세요"></p>
        <p>휴대폰번호: <input type="text" name="hp" id="hp" maxlength="20" placeholder="휴대폰 번호를 입력하세요(-포함)"></p>
        <p>이메일: <input type="email" name="email" id="email" maxlength="50" placeholder="이메일을 입력하세요"></p>
        <p>주민등록번호: <input type="text" name="ssn1" id="ssn1" maxlength="6" placeholder="주민번호 앞자리" class="ssn"> - 
            <input type="password" name="ssn2" id="ssn2" maxlength="7" placeholder="주민번호 뒷자리" class="ssn">
            <button type="button" onclick="checkSsn()">인증</button>
        </p>
        <p>우편번호:  <input type="text" name="zipcode" id="sample6_postcode" maxlength="5" placeholder="우편번호를 입력하세요">
            <button type="button" onclick="sample6_execDaumPostcode()">검색</button>
        </p>
        <p>주소: <input type="text" name="address1" id="sample6_address" placeholder="주소를 입력하세요"> </p>
        <p>상세 주소: 
            <input type="text" name="address2" id="sample6_detailAddress" placeholder="상세 주소를 입력하세요"> </p>
        <p>참고 항목: <input type="text" name="address3" id="sample6_extraAddress" placeholder="참고 사항을 입력하세요">
        </p>
        <p>
            <button type="submit">가입완료</button>
            <button type="reset">다시 작성</button>
        </p>
    </form>
</body>
</html>

<!-- 
    *form 태그
    action: 어디로 보낼지 적는 란
    method: 어떻게 보낼지 적는 란
        get: url에 정보를 실어서 보냄. 속도가 빠르고 보안성 취약
        post: url에 보이지 않도록 (네트워크에서 body로 묶어서) 보냄. 비밀번호 같은 중요내용 포함 시 사용
    value: 사용자로부터 입력을 받는 입력 필드

    *input 태그의 name: 
        서버에서 userid에 입력한 정보를 받아와서 사용 (서버에서 필요한 이름)
        
    *가입완료 버튼에 onclick="sendit()"을 넣어서 하면 에러가 발생한다. alert를 띄우긴 하지만 submit하려고 해서 화면이 넘어감
    -> 그러면 form 태그에 onsubmit="sendit()"을 하면 어떨까? form 태그에서 submit이 발생했을 때 sendit()을 실행해달라는 것이다. 이때도 위와 마찬가지로 submit 되어 다음 화면으로 넘어가게 된다 (focus 되지 않고 화면이 넘어감)
    -> 마지막으로 form 태그에 onclick="return sendit()"을 하고, sendit()안에 return false를 추가해준다. 그럼 이제서야 아이디를 입력하지 않고 가입완료를 눌렀을 때 alert를 띄우고 화면이 넘어가는 에러가 발생하지 않고 focus 되는 것을 확인할 수 있다. sendit()에서 false를 리턴해서 onsubmit="return false"가 될테니까, 비로소 submit이 false가 되어 정상 작동한다.
    
    *js 파일의 if문은 form 태그의 순서에 맞춰서 작성할 것
-->
