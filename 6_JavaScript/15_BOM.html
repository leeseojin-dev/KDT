<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM</title>
    <script>
        /*
            BOM(Browser Object Model)
            - 자바스크립트가 브라우저 자체를 제어하고 정보를 얻기 위해 사용하는 객체 모델
            - (비표준. 정상적으로 작동하는지 모든 브라우저에서 확인해야 함)

            API(Application Programming Interface)
            - 서로 다른 프로그램이나 시스템이 데이터를 주고받고 기능을 사용할 수 있도록 연결해주는 중간 통로
            
            1. window 객체
            - 자바스크립트에서 브라우저 창을 대표하는 최상위 객체로, 전역 범위에서 정의된 변수나 함수, 타이머, 팝업, 브라우저 정보 등 대부분의 기능을 포함하고 있음
            - HTML 페이지를 로드하면 브라우저는 자동으로 윈도우 객체를 생성하며, 자바스크립트 코드에서 명시적으로 window를 쓰지 않아도 사용할 수 있음 (window 생략 가능)

            2. location 객체
            - 자바스크립트에서 현재 웹 페이지의 URL(주소) 정보를 다루고 제어할 수 있게 해주는 window 객체의 하위 객체
            
            3. history 객체
            - 브라우저의 방문 기록을 제어할 수 있는 객체로, 사용자가 이전에 방문했던 페이지로 이동하거나 앞으로 다시 이동할 수 있는 기능을 제공

            4. navigator 객체
            - 브라우저에 대한 정보를 제공하는 객체로, 사용자의 브라우저 종류, 버전, 운영체제, 언어 설정, 온라인 여부 등 다양한 환경 정보를 확인할 수 있도록 해줌
            - 값이 있는지 없는지에 따라 사람인지 봇인지 구분하는 용도로 확인 (navigator가 넘겨주는 값이 정확하지 않을 수 있음.)

            4-1. geolocation : 사용자의 위치 정보를 가져오기 위한 API로, GPS, WIFI, IP 주소 등을 이용해 현재 위치를 알아냄. 사용자의 명시적인 동의가 있어야 작동함
        */
    </script>
</head>
<body>
    <button onclick="reloadPage()">페이지 새로고침</button>
    <button onclick="goToNaver()">네이버로 이동</button>
    <button onclick="showLocationInfo()">주소 정보 보기</button>
    <hr>
    <button onclick="goBack()">뒤로가기</button>
    <button onclick="goForward()">앞으로가기</button>
    <button onclick="showHistoryLength()">방문 기록 개수</button>
    <hr>
    <button onclick="showNavigatorInfo()">브라우저 정보 보기</button>
    <hr>
    <p id="locationInfo">위치 정보가 여기에 표시됩니다.</p>
    <button onclick="getLocation()">위치가져오기</button>

    <script>
        // 1. window 객체
        function showWindowInfo() {
            // window 객체 안에 navigator 객체 안에 메서드 또는 객체 등..
            // 최상위에 window 객체가 있고 window를 상속 받아서 다른 객체들이나 속성, 메서드가 존재
            console.log("브라우저 이름: ", window.navigator.appName)        // 브라우저 이름:  Netscape
            console.log("브라우저 엔진: ", window.navigator.product)        // 브라우저 엔진:  Gecko
            console.log("사용자 에이전트: ", window.navigator.userAgent)    // Mozilla/5.0 (Linux; Android 15; Pixel 9) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Mobile Safari/537.36
            console.log("현재 페이지 URL : ", window.location.href)

            // window 객체의 속성인 innerWidth와 innerHeight
            console.log("창 너비: ", window.innerWidth)
            console.log("창 높이: ", window.innerHeight)

            window.setTimeout(() => {
                alert("3초가 지났습니다")       // window 생략
            }, 3000)        // 3초
        }

        // 2. location 객체
        function showLocationInfo() {
            console.log("전체 URL: ", location.href)    //전체 URL:  http://127.0.0.1:5501/15_BOM.html
            console.log("프로토콜: ", location.protocol)        // 프로토콜:  http:
            console.log("호스트: ", location.host)              // 호스트:  127.0.0.1:5501
            console.log("호스트명: ", location.hostname)        // 호스트명:  127.0.0.1
            console.log("포트번호: ", location.port)            // 포트번호:  5501
            console.log("경로: ", location.pathname)            // 경로:  /15_BOM.html
            console.log("쿼리 문자열: ", location.search)       // 쿼리 문자열:  
            // (쿼리 문자열: 다른 페이지로 이동할 때 필요한 정보를 담은 문자열)
            // 예) http://127.0.0.1:5501/15_BOM.html?userid=apple
        }

        function reloadPage() {
            location.reload()
        }

        function goToNaver() {
            location.href = "https://www.naver.com"
        }

        // 3. history객체
        function goBack() {
            history.back()
        }

        function goForward() {
            history.forward()
        }

        function showHistoryLength() {
            alert("방문 기록 수: " + history.length)
        }

        // 4. navigator 객체
        function showNavigatorInfo() {              // bot인지 확인
            console.log("브라우저 이름(userAgent): ", navigator.userAgent)
            console.log("운영체제: ", navigator.platform)
            console.log("언어 설정: ", navigator.language)
            console.log("쿠키 사용 가능 여부: ", navigator.cookieEnabled)
        }

        // 4-1. geolocation
        // getCurrentPosition : GPS 정보
        // 매개변수니까 showPosition, showError가 아니라 다른 변수명 사용해도 됨
        // document : 브라우저 body를 관리하는 객체
        // showPosition : 위경도 값을 담을 변수
        // showError : 
        function getLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError)       
            } else {
                document.getElementById("locationInfo").innerText = "이 브라우저는 위치 정보를 지원하지 않습니다."     //locationInfo라는 id를 가진 태그를 찾아줘, 근데 없으면 "이 브라우저는 ..." 텍스트를 넣어줘
            }
        }

        function showPosition(position) {           // 위도와 경도를 뽑아와서 저장
            const latitude = position.coords.latitude
            const longitude = position.coords.longitude
            document.getElementById("locationInfo").innerText = `위도: ${latitude}, 경도: ${longitude}`
        }

        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    alert("사용자가 위치 정보 제공을 거부했습니다.")
                    break
                case error.POSITION_UNAVAILABLE: 
                    alert("위치 정보를 사용할 수 없습니다.")
                    break
                case error.TIMEOUT:
                    alert("위치 정보를 가져오는 데 시간이 초과되었습니다.")
                    break
                default:
                    alert("알 수 없는 오류가 발생했습니다.")
            }
        }
        
        // showWindowInfo()
        // showLocationInfo()
        
    </script>
</body>
</html>

<!-- 
    *Netscape

    *f12 - Network - Headers : 
    - 서버와 통신할 때 필요한 정보를 담은 부분
    - Request Headers : 사용자가 서버에게 이 페이지 보여주라고 요청하면서 내 컴퓨터에서 정보를 보내는 부분 (-> User-Agent 확인 가능)
    - Response Headers : 서버가 사용자에게 정보를 보내는 부분
    (이후 bot을 만들어 특정 사이트에 접속하게 되면 차단될 수 있는데, 이는 headers 부분이 없기 때문이다. 그래서 headers를 bot에 만들어서 보내면 브라우저로 들어오는 줄 알고 차단을 하지 않게 될 것이다.)

    *미디어 쿼리 나오기 이전 자바스크립트로 창 너비를 확인해가며 디자인하기도 했다
-->
