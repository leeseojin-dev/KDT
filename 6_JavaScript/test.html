<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
</head>
<body>
    <div><input type="checkbox" name="hobby" value="등산"><input type="checkbox" name="hobby" value="게임"><input type="checkbox" name="hobby" value="영화"></div>
    <div><input type="radio" name="gender" value="남자"><input type="radio" name="gender" value="여자"></div>
</body>
</html>

<!-- 
    checkbox와 radio는 name(그룹으로 묶는)과 value로 값을 필수로 갖는다 (value가 없다면 서버에서 gender 그룹이 어떤 값을 갖는지 모름)
    checkbox는 서버에서 받을 때 배열로 받음 (값을 여러개 가질 수 있으니까)
-->
