<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트</title>
    <script>
        /*
            이벤트(Event)
            - 사용자가 웹 페이지와 상호작용할 때 발생하는 특정 동작이나 상황을 의미
            - 버튼 클릭, 키보드 입력, 마우스 이동, 폼 제출, 창 닫기 등
            - 특정 반응(동작)을 하도록 코드를 작성
                이벤트 리스너를 등록
                addEventListener()
        */
    </script>
</head>
<body>
    <button onclick="sayHello()">인사하기

        <script>
            function sayHello() {
                alert("안녕하세요!")
            }
        </script>
    </button>
</body>
</html>
