<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
    <script>
        /*
            promise⭐
            자바스크립트에서 비동기 작업의 결과를 미래의 값으로 표현하는 객체로, 시간이 걸리는 작업이 성공적으로 완료되었는지 또는 실패했는지를 나중에 알려주기 위해 사용

            콜백지옥
            콜백 지옥은 자바스크립트에서 비동기 작업을 콜백 함수로 계속 중첩해 처리하다 보니 코드가 오른쪽으로 깊게 들여쓰기 되며 복잡해지고, 흐름을 한눈에 이해하기 어려워지는 문제를 말함

            resolve : 성공했을 때 리턴하는 콜백함수
            reject : 실패했을 때 리턴하는 콜백함수
            then : 성공했을 때 실행
            catch : 실패했을 때 실행

            const promise = new Promise((resolve, reject) => {
                if(성공) {
                    resolve(결과값)     // 작업 성공 시 호출
                } else {
                    reject(에러)        // 작업 실패 시 호출
                }
            })

            promise.then(result => {
                console.log("성공: ", result)
            })
            .catch(error => {
                console.error("실패: ", error)
            })
        */
    </script>
</head>
<body>
    <h2>Promise 요청</h2>
    <script>
        /*
        // 하나의 비동기 작업
        console.log("요청을 보냅니다 !!!")      // 서버에 '어떤 걸 주세요!'라는 요청을 보냄 (이후에 배울 내용)
        const getData = new Promise((resolve, reject) => {
            setTimeout(() => {
                const success = false        // patch를 사용해 서버에서 받아올 것(이후)
                if(success) {
                    resolve("서버에서 데이터를 성공적으로 받아왔습니다")        // then의 result로 문자열 전달
                } else {
                    reject("서버 요청 실패!")       // catch의 error로 문자열 전달
                }
            }, 2000)
        })

        getData.then((result) => {
            console.log("성공: ", result)
        })
        .catch((error) => {
            console.log("실패: ", error)
        })
        .finally(() => {        // finally는 무조건 실행
            console.log("작업 완료")
        })
        */

        function orderCoffee(menu) {
            console.log(`${menu} 주문을 접수했습니다. 잠시만 기다리세요`)
            const availableMenu = ['아메리카노', '디카페인 아메리카노', '카페라떼', '바닐라라떼']
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                   if(availableMenu.includes(menu)) {
                        resolve(`${menu}가 준비되었습니다. 맛있게 드세요 :)`)
                    } else {
                        reject(`죄송합니다. ${menu}는 판매하지 않습니다 :(`)
                    }
                }, 2000);
            })
        }

        orderCoffee("아메리카노").then((message) => {
            console.log(message)
        }).catch((error) => {
            console.log(error)
        }).finally(() => {
            console.log("주문이 완료되었습니다")
        })

        orderCoffee("녹차").then((message) => {
            console.log(message)
        }).catch((error) => {
            console.log(error)
        }).finally(() => {
            console.log("주문이 완료되었습니다")
        })

    </script>
</body>
</html>
